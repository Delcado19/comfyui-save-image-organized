<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" role="img" aria-labelledby="title desc">
  <title id="title">Save Image Organized</title>
  <desc id="desc">A ComfyUI-style save node placing PNG images into organized folders.</desc>
  <defs>
    <linearGradient id="bg" x1="54" y1="32" x2="346" y2="368" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#050505"/>
      <stop offset="0.58" stop-color="#101010"/>
      <stop offset="1" stop-color="#050505"/>
    </linearGradient>
    <linearGradient id="gold" x1="96" y1="60" x2="312" y2="340" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffdf2e"/>
      <stop offset="0.48" stop-color="#facc15"/>
      <stop offset="1" stop-color="#d89b00"/>
    </linearGradient>
    <linearGradient id="panel" x1="126" y1="82" x2="286" y2="246" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#171717"/>
      <stop offset="1" stop-color="#090909"/>
    </linearGradient>
    <filter id="shadow" x="-18%" y="-18%" width="136%" height="136%">
      <feDropShadow dx="0" dy="14" stdDeviation="14" flood-color="#000000" flood-opacity="0.55"/>
    </filter>
    <filter id="glow" x="-24%" y="-24%" width="148%" height="148%">
      <feDropShadow dx="0" dy="0" stdDeviation="5" flood-color="#facc15" flood-opacity="0.42"/>
    </filter>
  </defs>

  <rect width="400" height="400" rx="76" fill="url(#bg)"/>
  <path d="M73 305c60-30 126-28 197 5m30-279c-22 55-10 106 41 145" fill="none" stroke="#facc15" stroke-width="2" opacity="0.2"/>

  <g filter="url(#shadow)">
    <g transform="rotate(4 202 164)">
      <rect x="96" y="76" width="208" height="168" rx="22" fill="url(#panel)" stroke="url(#gold)" stroke-width="7"/>
      <circle cx="123" cy="108" r="10" fill="url(#gold)"/>
      <rect x="151" y="99" width="86" height="10" rx="5" fill="#3a3a3a"/>
      <g fill="none" stroke-linecap="round">
        <path d="M126 136h142" stroke="#353535" stroke-width="18"/>
        <path d="M126 168h142" stroke="#353535" stroke-width="18"/>
        <path d="M126 200h142" stroke="#353535" stroke-width="18"/>
        <path d="M126 136h78" stroke="#f8fafc" stroke-width="5" opacity="0.8"/>
        <path d="M126 168h106" stroke="#f8fafc" stroke-width="5" opacity="0.34"/>
        <path d="M126 200h58" stroke="#f8fafc" stroke-width="5" opacity="0.34"/>
      </g>
      <path d="m257 128 17 10-17 10Z" fill="#f8fafc" opacity="0.9"/>
      <path d="m257 160 17 10-17 10Z" fill="#f8fafc" opacity="0.55"/>
      <path d="m257 192 17 10-17 10Z" fill="url(#gold)"/>
    </g>

    <g filter="url(#glow)">
      <path d="M118 210c0-10 8-18 18-18h58l18 20h61c10 0 18 8 18 18v58c0 10-8 18-18 18H136c-10 0-18-8-18-18v-78Z" fill="#060606" stroke="url(#gold)" stroke-width="10" stroke-linejoin="round"/>
      <path d="M148 247h84v42h-84z" fill="#111111" stroke="#f8fafc" stroke-width="8" stroke-linejoin="round"/>
      <path d="m155 281 24-25 18 18 13-14 25 23" fill="none" stroke="url(#gold)" stroke-width="9" stroke-linecap="round" stroke-linejoin="round"/>
      <circle cx="219" cy="257" r="7" fill="#facc15"/>
      <path d="M227 177h35l26 27v77h-61Z" fill="#090909" stroke="#f8fafc" stroke-width="8" stroke-linejoin="round"/>
      <path d="M262 178v26h26" fill="none" stroke="#f8fafc" stroke-width="8" stroke-linejoin="round"/>
      <text x="258" y="246" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="25" font-weight="700" fill="#facc15">PNG</text>
    </g>
  </g>

  <g font-family="Arial, Helvetica, sans-serif" font-weight="800" text-anchor="middle">
    <text x="200" y="337" font-size="31" fill="#f8fafc">Save Image</text>
    <text x="200" y="367" font-size="31" fill="#facc15">Organized</text>
  </g>
</svg>
